<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=no">
  <title>🎂 电医2401班一周年</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      font-family: 'Quicksand', 'Segoe UI', 'PingFang SC', system-ui, sans-serif;
      background: #f5ebe0;
    }
    #info {
      position: absolute;
      top: 18px;
      left: 0; right: 0;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      color: #4a3729;
      text-shadow: 0 4px 20px rgba(255,220,180,0.3);
      font-weight: 600;
      letter-spacing: 2px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      padding: 0 16px;
    }
    #info h1 {
      margin: 0;
      font-size: 2.4rem;
      background: rgba(255,245,235,0.6);
      backdrop-filter: blur(8px);
      padding: 6px 32px;
      border-radius: 60px;
      border: 1px solid rgba(255,230,200,0.6);
      box-shadow: 0 8px 24px rgba(80,40,20,0.1);
      display: inline-block;
      pointer-events: auto;
    }
    #status {
      position: absolute;
      bottom: 30px;
      left: 0; right: 0;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      color: #6a4c38;
      font-weight: 500;
      font-size: 1.1rem;
      background: rgba(245,220,200,0.5);
      backdrop-filter: blur(4px);
      padding: 12px 28px;
      border-radius: 60px;
      border: 1px solid #f0d2b8;
      width: fit-content;
      margin: 0 auto;
      box-shadow: 0 6px 0 #c9ad94;
    }
    @media (max-width: 600px) {
      #info h1 { font-size: 1.5rem; padding: 4px 16px; }
      #status { font-size: 0.8rem; padding: 6px 16px; }
    }
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #f5ebe0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      font-size: 2.2rem;
      color: #6a4c38;
      font-weight: 600;
      transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .reset-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(255,245,235,0.8);
      backdrop-filter: blur(8px);
      border: 2px solid #dbb69b;
      color: #4d2e1e;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 0 #a67b62;
    }
    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #a67b62;
    }
    .reset-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #a67b62;
    }

    .toast-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 200;
      pointer-events: none;
    }
    .toast {
      background: rgba(255,245,235,0.9);
      backdrop-filter: blur(8px);
      color: #4d2e1e;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: 600;
      border: 2px solid #f0d2b8;
      box-shadow: 0 8px 32px rgba(80,40,20,0.15);
      opacity: 0;
      transform: scale(0.5) translateY(20px);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  </style>
</head>
<body>
  <div id="loading">🍰 蛋糕正在烘焙...</div>
  <div id="info"><h1>🎂 电医2401班一周年</h1></div>
  <div id="status">点击姓名标签享用蛋糕</div>
  <button class="reset-btn" onclick="resetAll()">🔄 重置蛋糕</button>
  <div class="toast-container"><div class="toast" id="toast"></div></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ========== 姓名列表 ==========
    const names = [
      "王思晗","朱佳琪","吴浩宇","马鸣悦","廖静宇","张姬瑶","朱奕恒",
      "唐亦朝","万笑冉","曹永和","孙研","曲开研","曹东琳","李思恩",
      "祝世琦","李垚","彭文萱","赵懋臣","刘国铭","董书德","王浩宇",
      "戚继旺","孙嫣然","杨常涛","李昕媛","唐思雨","张思淼","赵方舟",
      "宗柏辰","李福容","刘鲁生","毛帅","平新丽","周淏泳"
    ];
    const total = names.length;
    const sliceAngle = (Math.PI * 2) / total;

    // ========== 场景 ==========
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5ebe0);
    scene.fog = new THREE.Fog(0xf5ebe0, 30, 60);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.NoToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 32, 2);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.enableZoom = true;
    controls.target.set(0, 0, 0);
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.minDistance = 10;
    controls.maxDistance = 60;

    // ========== 灯光系统 ==========
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
    mainLight.position.set(5, 20, 5);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 2048;
    mainLight.shadow.mapSize.height = 2048;
    const d = 15;
    mainLight.shadow.camera.left = -d;
    mainLight.shadow.camera.right = d;
    mainLight.shadow.camera.top = d;
    mainLight.shadow.camera.bottom = -d;
    mainLight.shadow.camera.near = 1;
    mainLight.shadow.camera.far = 50;
    scene.add(mainLight);

    scene.add(new THREE.DirectionalLight(0xffffff, 0.4).position.set(-5, 10, -5));

    // ========== 地面与托盘 ==========
    const plateGeo = new THREE.CylinderGeometry(6.0, 6.3, 0.15, 64);
    const plateMat = new THREE.MeshStandardMaterial({ 
      color: 0xf5f0e8, 
      roughness: 0.3, 
      metalness: 0.1,
    });
    const plate = new THREE.Mesh(plateGeo, plateMat);
    plate.position.y = -0.08;
    plate.receiveShadow = true;
    scene.add(plate);

    const plateRimGeo = new THREE.TorusGeometry(6.15, 0.08, 8, 64);
    const plateRimMat = new THREE.MeshStandardMaterial({ 
      color: 0xd4a574, 
      roughness: 0.3, 
      metalness: 0.3 
    });
    const plateRim = new THREE.Mesh(plateRimGeo, plateRimMat);
    plateRim.rotation.x = -Math.PI / 2;
    plateRim.position.y = 0;
    scene.add(plateRim);

    // ========== 蛋糕组 ==========
    const cakeGroup = new THREE.Group();
    scene.add(cakeGroup);

    const sliceGroups = [];
    const sliceData = [];
    const S = 2.0;

    // ========== 有食欲的温暖配色 ==========
    const palette = [
      0xe8b4a0, 0xe8c4a0, 0xe8d4a0, 0xc4e8a0, 0xa0e8c4, 0xa0d4e8,
      0xa0b4e8, 0xc4a0e8, 0xe8a0d4, 0xe8a0b4, 0xd4c4a0, 0xa0d4c4,
      0xa0c4d4, 0xc4a0d4, 0xd4a0c4, 0xe8c4b4, 0xc4e8c4, 0xc4c4e8,
      0xe8d4c4, 0xc4e8d4, 0xd4c4e8, 0xe8c4d4, 0xd4e8c4, 0xc4d4e8,
      0xf0c0a8, 0xf0d0a8, 0xa8f0d0, 0xd0a8f0, 0xa8d0f0, 0xf0a8d0,
      0xd4c0a8, 0xa8d4c0, 0xc0a8d4, 0xd4a8c0
    ];

    function getColor(i) {
      return new THREE.Color(palette[i % palette.length]);
    }

    function createSectorShape(startAngle, endAngle, outerRadius, segments = 32) {
      const shape = new THREE.Shape();
      shape.moveTo(0, 0);
      for (let j = 0; j <= segments; j++) {
        const t = j / segments;
        const angle = startAngle + t * (endAngle - startAngle);
        shape.lineTo(Math.cos(angle) * outerRadius, Math.sin(angle) * outerRadius);
      }
      shape.lineTo(0, 0);
      return shape;
    }

    // ========== 创建蛋糕切片 - 所有部件在同一个group中 ==========
    for (let i = 0; i < total; i++) {
      const startAngle = i * sliceAngle;
      const endAngle = startAngle + sliceAngle;
      const midAngle = startAngle + sliceAngle / 2;
      const color = getColor(i);
      const lightColor = color.clone().lerp(new THREE.Color(0xffffff), 0.3);
      const darkColor = color.clone().lerp(new THREE.Color(0x000000), 0.1);

      const group = new THREE.Group();
      group.userData.index = i;
      group.userData.eaten = false;

      // ---- 蛋糕主体 ----
      const shape = createSectorShape(startAngle, endAngle, 3.2 * S, 32);
      const extrudeSettings = {
        depth: 2.0 * S,
        bevelEnabled: true,
        bevelThickness: 0.05 * S,
        bevelSize: 0.05 * S,
        bevelSegments: 2,
      };
      const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);

      const bodyMat = new THREE.MeshBasicMaterial({
        color: color,
        side: THREE.DoubleSide,
      });
      const body = new THREE.Mesh(geo, bodyMat);
      body.rotation.x = -Math.PI / 2;
      body.position.y = 0.5 * S;
      body.castShadow = true;
      group.add(body);

      // ---- 顶部奶油层 ----
      const topShape = createSectorShape(startAngle, endAngle, 3.15 * S, 28);
      const topGeo = new THREE.ExtrudeGeometry(topShape, {
        depth: 0.12 * S,
        bevelEnabled: true,
        bevelThickness: 0.02 * S,
        bevelSize: 0.02 * S,
        bevelSegments: 1,
      });
      const topMat = new THREE.MeshBasicMaterial({
        color: lightColor,
        side: THREE.DoubleSide,
      });
      const top = new THREE.Mesh(topGeo, topMat);
      top.rotation.x = -Math.PI / 2;
      top.position.y = 2.5 * S;
      group.add(top);

      // ---- 顶部果酱层 ----
      const jamShape = createSectorShape(startAngle, endAngle, 2.9 * S, 0.2 * S, 24);
      const jamGeo = new THREE.ShapeGeometry(jamShape);
      const jamMat = new THREE.MeshBasicMaterial({
        color: darkColor,
        transparent: true,
        opacity: 0.4,
        side: THREE.DoubleSide,
      });
      const jam = new THREE.Mesh(jamGeo, jamMat);
      jam.rotation.x = -Math.PI / 2;
      jam.position.y = 2.62 * S;
      group.add(jam);

      // ---- 奶油花边 (外边缘) ----
      const creamCount = 6;
      for (let j = 0; j < creamCount; j++) {
        const t = (j + 0.5) / creamCount;
        const angle = startAngle + t * sliceAngle;
        const r = 3.05 * S;
        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;

        const creamMat = new THREE.MeshBasicMaterial({ color: 0xfff8f0 });
        const ball = new THREE.Mesh(new THREE.SphereGeometry(0.15 * S, 10, 10), creamMat);
        ball.position.set(x, 2.72 * S, z);
        group.add(ball);

        // 奶油尖尖
        const tipMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const tip = new THREE.Mesh(
          new THREE.ConeGeometry(0.06 * S, 0.12 * S, 6),
          tipMat
        );
        tip.position.set(x, 2.88 * S, z);
        group.add(tip);
      }

      // ---- 侧边奶油条纹 ----
      for (let j = 0; j < 3; j++) {
        const t = (j + 0.5) / 3;
        const angle = startAngle + t * sliceAngle;
        const r = 3.1 * S;
        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;

        const stripeMat = new THREE.MeshBasicMaterial({
          color: 0xfff5ea,
          transparent: true,
          opacity: 0.7,
        });
        const stripe = new THREE.Mesh(
          new THREE.CylinderGeometry(0.06 * S, 0.08 * S, 1.6 * S, 6),
          stripeMat
        );
        stripe.position.set(x, 1.5 * S, z);
        stripe.rotation.y = -angle;
        group.add(stripe);
      }

      // ---- 顶部装饰糖粒 ----
      for (let j = 0; j < 6; j++) {
        const t = (j + 0.15) / 6;
        const angle = startAngle + t * sliceAngle;
        const r = (0.5 + Math.random() * 2.4) * S;
        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;
        const hue = 20 + Math.random() * 30;
        const sprinkleMat = new THREE.MeshBasicMaterial({
          color: new THREE.Color(`hsl(${hue}, 55%, 70%)`),
        });
        const sprinkle = new THREE.Mesh(
          new THREE.CylinderGeometry(0.04 * S, 0.05 * S, 0.08 * S, 4),
          sprinkleMat
        );
        sprinkle.position.set(x, 2.66 * S, z);
        sprinkle.rotation.set(Math.random() * 0.8, Math.random() * Math.PI, Math.random() * 0.8);
        group.add(sprinkle);
      }

      cakeGroup.add(group);
      sliceGroups.push(group);

      const meshes = [];
      group.traverse(child => {
        if (child.isMesh) meshes.push(child);
      });

      sliceData.push({
        group: group,
        name: names[i],
        midAngle: midAngle,
        startAngle: startAngle,
        endAngle: endAngle,
        eaten: false,
        animating: false,
        meshes: meshes,
      });
    }

    // ========== 姓名标签 - 精确对应 ==========
    const labelGroup = new THREE.Group();
    scene.add(labelGroup);

    for (let i = 0; i < total; i++) {
      const data = sliceData[i];
      const midAngle = data.midAngle;

      // 标签放在对应切片中线的延长线上
      const labelRadius = 5.5 * S;
      const x = Math.cos(midAngle) * labelRadius;
      const z = Math.sin(midAngle) * labelRadius;
      const y = 6.0 * S;

      const div = document.createElement('div');
      div.style.color = '#3d2b1e';
      div.style.fontFamily = '"Quicksand", "PingFang SC", "Segoe UI", sans-serif';
      div.style.fontSize = '14px';
      div.style.fontWeight = '700';

      const hue = (i * 37 + 200) % 360;
      div.style.background = `linear-gradient(135deg, hsl(${hue}, 45%, 85%), hsl(${(hue + 30) % 360}, 45%, 80%))`;
      div.style.padding = '5px 14px';
      div.style.borderRadius = '40px';
      div.style.border = '2px solid #ffffff';
      div.style.boxShadow = '0 4px 16px rgba(40,20,10,0.15), 0 2px 0 #b38b72';
      div.style.textShadow = '0 1px 2px rgba(255,255,255,0.4)';
      div.style.pointerEvents = 'auto';
      div.style.cursor = 'pointer';
      div.style.transition = 'all 0.15s ease';
      div.style.userSelect = 'none';
      div.style.backdropFilter = 'blur(4px)';
      div.style.whiteSpace = 'nowrap';
      div.style.textAlign = 'center';
      div.style.display = 'inline-flex';
      div.style.alignItems = 'center';
      div.style.justifyContent = 'center';
      div.innerHTML = names[i];

      // 使用闭包捕获正确的索引
      const idx = i;
      div.addEventListener('mouseenter', () => {
        div.style.transform = 'scale(1.2)';
        div.style.boxShadow = '0 8px 24px rgba(40,20,10,0.25), 0 2px 0 #b38b72';
      });

      div.addEventListener('mouseleave', () => {
        div.style.transform = 'scale(1)';
        div.style.boxShadow = '0 4px 16px rgba(40,20,10,0.15), 0 2px 0 #b38b72';
      });

      div.addEventListener('click', (e) => {
        e.stopPropagation();
        eatSlice(idx);
      });

      const label = new CSS2DObject(div);
      label.position.set(x, y, z);
      labelGroup.add(label);
      data.label = label;
      data.labelDiv = div;
    }

    // ========== 复杂蜡烛装饰 ==========
    const candleGroup = new THREE.Group();

    // 蜡烛主体
    const candleMat = new THREE.MeshBasicMaterial({ 
      color: 0xf0d0c0,
    });
    const candle = new THREE.Mesh(new THREE.CylinderGeometry(0.25 * S, 0.3 * S, 0.9 * S, 16), candleMat);
    candle.position.set(0, 2.9 * S, 0);
    candleGroup.add(candle);

    // 蜡烛条纹
    const stripeColors = [0xf0c8b0, 0xf0d8c0, 0xf0e0d0, 0xf0c8b8];
    for (let j = 0; j < 4; j++) {
      const stripeMat = new THREE.MeshBasicMaterial({
        color: stripeColors[j % stripeColors.length],
      });
      const stripe = new THREE.Mesh(
        new THREE.CylinderGeometry(0.27 * S, 0.28 * S, 0.08 * S, 8),
        stripeMat
      );
      stripe.position.set(0, 2.7 * S + j * 0.2 * S, 0);
      candleGroup.add(stripe);
    }

    // 蜡烛顶部装饰环
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xf0d8c8 });
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.3 * S, 0.04 * S, 8, 16),
      ringMat
    );
    ring.position.set(0, 3.35 * S, 0);
    ring.rotation.x = Math.PI / 2;
    candleGroup.add(ring);

    // 火焰 - 多层
    const fireMat1 = new THREE.MeshBasicMaterial({ color: 0xff8844 });
    const fire1 = new THREE.Mesh(new THREE.SphereGeometry(0.18 * S, 8, 8), fireMat1);
    fire1.scale.set(1, 1.6, 1);
    fire1.position.set(0, 3.5 * S, 0);
    candleGroup.add(fire1);

    const fireMat2 = new THREE.MeshBasicMaterial({ color: 0xffaa66 });
    const fire2 = new THREE.Mesh(new THREE.SphereGeometry(0.12 * S, 8, 8), fireMat2);
    fire2.scale.set(0.8, 1.4, 0.8);
    fire2.position.set(0, 3.55 * S, 0);
    candleGroup.add(fire2);

    const fireMat3 = new THREE.MeshBasicMaterial({ color: 0xffdd88 });
    const fire3 = new THREE.Mesh(new THREE.SphereGeometry(0.07 * S, 8, 8), fireMat3);
    fire3.scale.set(0.6, 1.2, 0.6);
    fire3.position.set(0, 3.6 * S, 0);
    candleGroup.add(fire3);

    // 光晕
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xffaa44,
      transparent: true,
      opacity: 0.15,
    });
    const glow = new THREE.Mesh(new THREE.SphereGeometry(0.7 * S, 8, 8), glowMat);
    glow.position.set(0, 3.4 * S, 0);
    candleGroup.add(glow);

    // 蜡烛底座装饰
    const baseMat = new THREE.MeshBasicMaterial({ color: 0xf0d8c8 });
    const base = new THREE.Mesh(
      new THREE.CylinderGeometry(0.4 * S, 0.5 * S, 0.08 * S, 16),
      baseMat
    );
    base.position.set(0, 2.5 * S, 0);
    candleGroup.add(base);

    // 底座小珠子
    for (let j = 0; j < 8; j++) {
      const angle = (j / 8) * Math.PI * 2;
      const beadMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(`hsl(${j * 45 + 20}, 40%, 75%)`),
      });
      const bead = new THREE.Mesh(
        new THREE.SphereGeometry(0.04 * S, 6, 6),
        beadMat
      );
      bead.position.set(Math.cos(angle) * 0.42 * S, 2.54 * S, Math.sin(angle) * 0.42 * S);
      candleGroup.add(bead);
    }

    scene.add(candleGroup);

    // ========== 底部散落糖珠 ==========
    for (let i = 0; i < 60; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = (2.0 + Math.random() * 2.0) * S;
      const x = Math.cos(angle) * r;
      const z = Math.sin(angle) * r;
      const hue = 20 + Math.random() * 30;
      const beadMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(`hsl(${hue}, 50%, 75%)`),
      });
      const bead = new THREE.Mesh(new THREE.SphereGeometry((0.04 + Math.random() * 0.04) * S, 6, 6), beadMat);
      bead.position.set(x, 0.1 * S, z);
      scene.add(bead);
    }

    // ========== 粒子系统 ==========
    const particleCount = 200;
    const particleGeo = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleColors = new Float32Array(particleCount * 3);
    const particleSizes = new Float32Array(particleCount);
    const particleVelocities = [];

    for (let i = 0; i < particleCount; i++) {
      particlePositions[i * 3] = 0;
      particlePositions[i * 3 + 1] = -100;
      particlePositions[i * 3 + 2] = 0;
      particleColors[i * 3] = 1;
      particleColors[i * 3 + 1] = 1;
      particleColors[i * 3 + 2] = 1;
      particleSizes[i] = 0;
      particleVelocities.push({ vx: 0, vy: 0, vz: 0, life: 0, maxLife: 0 });
    }

    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
    particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

    const particleMat = new THREE.PointsMaterial({
      size: 0.15,
      vertexColors: true,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const particleSystem = new THREE.Points(particleGeo, particleMat);
    scene.add(particleSystem);

    function spawnParticles(x, y, z, color) {
      const count = 30;
      let spawned = 0;
      for (let i = 0; i < particleCount && spawned < count; i++) {
        const vel = particleVelocities[i];
        if (vel.life <= 0) {
          particlePositions[i * 3] = x + (Math.random() - 0.5) * 0.5;
          particlePositions[i * 3 + 1] = y + (Math.random() - 0.5) * 0.5;
          particlePositions[i * 3 + 2] = z + (Math.random() - 0.5) * 0.5;

          const speed = 0.05 + Math.random() * 0.1;
          const angle = Math.random() * Math.PI * 2;
          const height = Math.random() * Math.PI;
          vel.vx = Math.cos(angle) * Math.sin(height) * speed;
          vel.vy = (0.05 + Math.random() * 0.15);
          vel.vz = Math.sin(angle) * Math.sin(height) * speed;
          vel.life = 1.0;
          vel.maxLife = 1.0;

          particleColors[i * 3] = color.r;
          particleColors[i * 3 + 1] = color.g;
          particleColors[i * 3 + 2] = color.b;
          particleSizes[i] = 0.1 + Math.random() * 0.15;

          spawned++;
        }
      }
    }

    function updateParticles() {
      for (let i = 0; i < particleCount; i++) {
        const vel = particleVelocities[i];
        if (vel.life > 0) {
          particlePositions[i * 3] += vel.vx;
          particlePositions[i * 3 + 1] += vel.vy;
          particlePositions[i * 3 + 2] += vel.vz;
          vel.vy -= 0.002;
          vel.life -= 0.015;
          particleSizes[i] *= 0.97;

          if (vel.life <= 0) {
            particlePositions[i * 3 + 1] = -100;
          }
        }
      }
      particleGeo.attributes.position.needsUpdate = true;
      particleGeo.attributes.color.needsUpdate = true;
      particleGeo.attributes.size.needsUpdate = true;
    }

    // ========== 核心：食用动画 ==========
    function eatSlice(index) {
      const data = sliceData[index];
      if (data.eaten || data.animating) return;

      data.eaten = true;
      data.animating = true;
      data.group.userData.eaten = true;

      if (data.label) data.label.visible = false;

      const group = data.group;
      const midAngle = data.midAngle;

      const liftDirX = Math.cos(midAngle);
      const liftDirZ = Math.sin(midAngle);

      const startY = 0;
      const liftHeight = 1.5 * S;
      const moveOut = 2.5 * S;
      const duration = 900;
      const startTime = performance.now();

      function animateEat() {
        const now = performance.now();
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);

        if (progress < 0.25) {
          const p = progress / 0.25;
          const e = 1 - Math.pow(1 - p, 3);
          group.position.y = startY + liftHeight * 0.3 * e;
          group.rotation.z = Math.sin(midAngle) * 0.08 * e;
          group.rotation.x = -Math.cos(midAngle) * 0.08 * e;
        } else if (progress < 0.6) {
          const p = (progress - 0.25) / 0.35;
          const e = 1 - Math.pow(1 - p, 2);
          group.position.y = startY + liftHeight * 0.3 + (liftHeight * 0.7) * e;
          group.position.x = liftDirX * moveOut * e;
          group.position.z = liftDirZ * moveOut * e;
          group.rotation.z = Math.sin(midAngle) * (0.08 + e * 0.25);
          group.rotation.x = -Math.cos(midAngle) * (0.08 + e * 0.25);
          group.rotation.y = e * 0.3;
        } else {
          const p = (progress - 0.6) / 0.4;
          const e = p * p;
          group.position.y = startY + liftHeight - e * 4 * S;
          group.position.x = liftDirX * moveOut * (1 + e * 1.5);
          group.position.z = liftDirZ * moveOut * (1 + e * 1.5);
          group.rotation.z = Math.sin(midAngle) * (0.33 + e * 0.8);
          group.rotation.x = -Math.cos(midAngle) * (0.33 + e * 0.8);
          group.rotation.y = 0.3 + e * 2.0;

          const fade = Math.max(0, 1 - e * 1.5);
          data.meshes.forEach(mesh => {
            if (mesh.material) {
              if (Array.isArray(mesh.material)) {
                mesh.material.forEach(m => {
                  m.transparent = true;
                  m.opacity = fade;
                });
              } else {
                mesh.material.transparent = true;
                mesh.material.opacity = fade;
              }
            }
          });
        }

        if (progress < 1) {
          requestAnimationFrame(animateEat);
        } else {
          group.visible = false;
          data.animating = false;
          showEatEffect(data);
          spawnParticles(
            group.position.x,
            2.5 * S,
            group.position.z,
            getColor(index)
          );
        }
      }
      animateEat();
    }

    function showEatEffect(data) {
      const toast = document.getElementById('toast');
      toast.innerHTML = `🍰 ${data.name} 的蛋糕被享用啦！✨`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ========== 重置功能 ==========
    window.resetAll = function() {
      sliceData.forEach((data, index) => {
        data.eaten = false;
        data.animating = false;
        data.group.userData.eaten = false;
        data.group.visible = true;
        data.group.position.set(0, 0, 0);
        data.group.rotation.set(0, 0, 0);
        data.group.scale.set(1, 1, 1);

        if (data.label) data.label.visible = true;

        data.meshes.forEach(mesh => {
          if (mesh.material) {
            if (Array.isArray(mesh.material)) {
              mesh.material.forEach(m => {
                m.transparent = false;
                m.opacity = 1;
              });
            } else {
              mesh.material.transparent = false;
              mesh.material.opacity = 1;
            }
          }
        });
      });

      const toast = document.getElementById('toast');
      toast.innerHTML = '🎂 蛋糕已重置！快来享用吧~';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    };

    // ========== 点击检测 ==========
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const targets = [];
      sliceGroups.forEach(g => {
        g.traverse(child => {
          if (child.isMesh) targets.push(child);
        });
      });
      const intersects = raycaster.intersectObjects(targets);
      if (intersects.length > 0) {
        const hit = intersects[0].object;
        let parent = hit.parent;
        while (parent && parent.userData?.index === undefined) {
          parent = parent.parent;
        }
        if (parent && parent.userData && parent.userData.index !== undefined) {
          const idx = parent.userData.index;
          if (!sliceData[idx].eaten && !sliceData[idx].animating) {
            eatSlice(idx);
          }
        }
      }
    });

    // ========== 窗口自适应 ==========
    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      labelRenderer.setSize(w, h);
    });

    // ========== 动画循环 ==========
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateParticles();

      const time = Date.now() / 1000;

      // 火焰动画
      const fireMeshes = [fire1, fire2, fire3];
      fireMeshes.forEach((f, idx) => {
        const scale = 1 + Math.sin(time * (8 + idx * 3)) * 0.12 + Math.sin(time * (13 + idx * 2)) * 0.06;
        f.scale.y = scale * (1 + idx * 0.1);
        f.scale.x = 1 + Math.sin(time * (7 + idx * 2)) * 0.05;
        f.position.y = 3.5 * S + Math.sin(time * (10 + idx * 2)) * 0.04 * S + idx * 0.05 * S;
        f.position.x = Math.sin(time * (6 + idx * 3)) * 0.02 * S;
        f.position.z = Math.cos(time * (5 + idx * 4)) * 0.02 * S;
      });

      glow.scale.setScalar(1 + Math.sin(time * 4) * 0.08);

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 800);
    renderer.domElement.addEventListener('dblclick', () => {
      controls.autoRotate = !controls.autoRotate;
    });
  </script>
</body>
